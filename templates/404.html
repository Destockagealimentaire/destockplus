{% extends "base.html" %}

{% block title %}Page non trouvée - DestockPro{% endblock %}

{% block content %}
<div class="error-page">
    <div class="container">
        <div class="error-content">
            <h1>404</h1>
            <h2>Page non trouvée</h2>
            <p>Désolé, la page que vous recherchez n'existe pas ou a été déplacée.</p>
            <a href="{{ url_for('index') }}" class="btn-primary">
                <i class="fas fa-home"></i>
                Retour à l'accueil
            </a>
        </div>
    </div>
</div>

<style>
.error-page {
    min-height: 60vh;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 4rem 0;
}

.error-content h1 {
    font-size: 8rem;
    font-weight: 800;
    color: var(--secondary);
    line-height: 1;
    margin-bottom: 1rem;
    text-shadow: 4px 4px 0 var(--accent);
}

.error-content h2 {
    font-size: 2rem;
    color: var(--text);
    margin-bottom: 1rem;
}

.error-content p {
    color: var(--text-light);
    margin-bottom: 2rem;
    max-width: 500px;
    margin-left: auto;
    margin-right: auto;
}

.btn-primary {
    display: inline-flex;
    align-items: center;
    gap: 0.5rem;
    padding: 1rem 2rem;
    background: var(--secondary);
    color: var(--primary);
    text-decoration: none;
    border-radius: 8px;
    font-weight: 600;
    transition: var(--transition);
}

.btn-primary:hover {
    background: var(--accent);
    transform: translateY(-2px);
    box-shadow: var(--shadow);
}
</style>
{% endblock %}
