{% extends "base.html" %}

{% block title %}Connexion - Destockage Alimentaire{% endblock %}

{% block content %}
<div class="auth-section">
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <h1>Connexion</h1>
                <p>Accédez à votre espace personnel</p>
            </div>

            <form method="POST" action="/connexion" class="auth-form">
                <div class="form-group">
                    <label for="email">Adresse email</label>
                    <input type="email" id="email" name="email" class="form-input" 
                           placeholder="votre@email.com" required>
                </div>

                <div class="form-group">
                    <label for="password">Mot de passe</label>
                    <input type="password" id="password" name="password" class="form-input" 
                           placeholder="••••••••" required>
                    <a href="/mot-de-passe-oublie" class="forgot-password">Mot de passe oublié ?</a>
                </div>

                <div class="form-group">
                    <label class="checkbox-label">
                        <input type="checkbox" name="remember">
                        <span>Se souvenir de moi</span>
                    </label>
                </div>

                <button type="submit" class="btn btn-primary btn-block">
                    Se connecter
                </button>
            </form>

            <div class="auth-footer">
                <p>Pas encore de compte ? <a href="/inscription">Créer un compte</a></p>
            </div>

            <div class="auth-divider">
                <span>Ou</span>
            </div>

            <div class="social-login">
                <button class="btn-social google">
                    <span class="social-icon">G</span>
                    Continuer avec Google
                </button>
                <button class="btn-social facebook">
                    <span class="social-icon">f</span>
                    Continuer avec Facebook
                </button>
            </div>
        </div>
    </div>
</div>

<style>
.auth-section {
    min-height: calc(100vh - 200px);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 2rem;
    background: linear-gradient(135deg, var(--surface) 0%, var(--background) 100%);
}

.auth-container {
    max-width: 480px;
    width: 100%;
}

.auth-card {
    background: var(--background);
    border-radius: 20px;
    padding: 2.5rem;
    box-shadow: var(--shadow-hover);
    border: 1px solid var(--border);
}

.auth-header {
    text-align: center;
    margin-bottom: 2rem;
}

.auth-header h1 {
    font-size: 2rem;
    color: var(--primary);
    margin-bottom: 0.5rem;
}

.auth-header p {
    color: var(--text-light);
}

.auth-form {
    margin-bottom: 1.5rem;
}

.form-group {
    margin-bottom: 1.5rem;
}

.form-group label {
    display: block;
    margin-bottom: 0.5rem;
    font-weight: 500;
    color: var(--text);
}

.form-input {
    width: 100%;
    padding: 0.8rem 1rem;
    border: 2px solid var(--border);
    border-radius: 8px;
    font-size: 1rem;
    transition: var(--transition);
}

.form-input:focus {
    outline: none;
    border-color: var(--secondary);
    box-shadow: 0 0 0 3px rgba(196, 167, 71, 0.1);
}

.forgot-password {
    display: block;
    text-align: right;
    margin-top: 0.5rem;
    color: var(--secondary);
    text-decoration: none;
    font-size: 0.9rem;
}

.forgot-password:hover {
    text-decoration: underline;
}

.checkbox-label {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    cursor: pointer;
}

.checkbox-label input[type="checkbox"] {
    width: 18px;
    height: 18px;
    cursor: pointer;
}

.btn-block {
    width: 100%;
    padding: 1rem;
    font-size: 1.1rem;
}

.auth-footer {
    text-align: center;
    margin-top: 1.5rem;
    padding-top: 1.5rem;
    border-top: 1px solid var(--border);
}

.auth-footer a {
    color: var(--secondary);
    text-decoration: none;
    font-weight: 600;
}

.auth-footer a:hover {
    text-decoration: underline;
}

.auth-divider {
    text-align: center;
    position: relative;
    margin: 1.5rem 0;
}

.auth-divider::before,
.auth-divider::after {
    content: '';
    position: absolute;
    top: 50%;
    width: calc(50% - 30px);
    height: 1px;
    background: var(--border);
}

.auth-divider::before {
    left: 0;
}

.auth-divider::after {
    right: 0;
}

.auth-divider span {
    background: var(--background);
    padding: 0 1rem;
    color: var(--text-light);
    font-size: 0.9rem;
}

.social-login {
    display: flex;
    flex-direction: column;
    gap: 1rem;
}

.btn-social {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 1rem;
    padding: 0.8rem;
    border: 2px solid var(--border);
    border-radius: 8px;
    background: var(--background);
    font-size: 1rem;
    font-weight: 500;
    cursor: pointer;
    transition: var(--transition);
}

.btn-social:hover {
    background: var(--surface);
    transform: translateY(-2px);
}

.btn-social.google:hover {
    border-color: #DB4437;
}

.btn-social.facebook:hover {
    border-color: #4267B2;
}

.social-icon {
    font-size: 1.2rem;
    font-weight: 600;
}

@media (max-width: 768px) {
    .auth-card {
        padding: 1.5rem;
    }
}
</style>
{% endblock %}
